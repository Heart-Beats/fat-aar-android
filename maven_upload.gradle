// ============================================================================
// 统一 Maven 发布配置（根项目级别）
// ============================================================================
// 在根项目 build.gradle 中通过 apply from 引入，自动为所有子项目注入发布能力。
// 支持的项目类型（自动检测）：
//   - com.android.library（Android AAR）
//   - java-library / groovy / kotlin-jvm（JAR）
//   - 自定义产物模式（通过 ext.publishArtifact 指定预编译文件）
//
// 发布配置说明：
//   每个需要发布的子项目须在自身目录下创建 gradle.properties，包含：
//   PUBLISH_ARTIFACT_ID  （必填）构件 ID
//   PUBLISH_GROUP_ID     （可选，默认取根项目的值）
//   PUBLISH_VERSION      （可选，默认取根项目的值）
//   publishEnabled       （可选，默认 true；设为 false 可跳过该子项目）
//
//   POM 元数据属性（均可选，优先读子项目，其次取根项目）：
//   PUBLISH_POM_NAME / PUBLISH_POM_DESCRIPTION / PUBLISH_POM_URL
//   PUBLISH_DEVELOPER_ID / PUBLISH_DEVELOPER_NAME / PUBLISH_DEVELOPER_EMAIL
//   PUBLISH_SCM_CONNECTION / PUBLISH_SCM_DEV_CONNECTION / PUBLISH_SCM_URL
//   PUBLISH_LICENSE_NAME / PUBLISH_LICENSE_URL
//
//   自定义产物模式，还需在 build.gradle 中声明：
//   ext.publishArtifact = file('xxx.aar')
//
// ============================================================================


// ============================================================================
// 辅助函数 — 从 local.properties / 环境变量 / 项目属性中读取密钥
// ============================================================================
def getSecret = { String key, String envKey = null ->
    File secretPropsFile = rootProject.file('local.properties')
    if (secretPropsFile.exists()) {
        Properties p = new Properties()
        p.load(new FileInputStream(secretPropsFile))
        if (p.containsKey(key)) return p.getProperty(key)
    }
    if (envKey != null) {
        def env = System.getenv(envKey)
        if (env != null) return env
    }
    if (rootProject.hasProperty(key)) return rootProject.property(key)
    return null
}

// ============================================================================
// Central Portal Publisher API 配置（根项目级别）
// ============================================================================
// 适用于新 Portal 账号（central.sonatype.com 注册、namespace 在 Portal 验证）。
// 这类账号没有旧式 OSSRH staging profile，因此不能使用
// gradle-nexus/publish-plugin（走 staging API 会报
// "Failed to find staging profile"）。改为直接调用 Portal 的
// Publisher API：把 maven-publish 产出的已签名产物打成 ZIP bundle，
// POST 到 https://central.sonatype.com/api/v1/publisher/upload。
//
// 凭证（local.properties / 环境变量 / 项目属性，读取顺序同 getSecret）：
//   portalUsername      —— Portal User Token 的用户名（UUID 形式，非登录账号）
//   portalPassword      —— Portal User Token 的密码（UUID 形式）
// 环境变量备选：PORTAL_USERNAME / PORTAL_PASSWORD
// ============================================================================

// ============================================================================
// 子项目发布配置
// ============================================================================
// 分两阶段执行：
//   阶段一（子项目 evaluate 之前）：读取 gradle.properties 判断是否需要发布，
//           若需要则提前 apply maven-publish + signing 插件。
//   阶段二（afterEvaluate 回调中）：检测子项目实际应用了哪个插件，
//           据此配置对应的发布产物（AAR / JAR / 自定义文件）。
// ============================================================================

rootProject.subprojects { sub ->
    // 检查子项目目录下是否存在 gradle.properties（evaluate 之前即可读文件系统）
    def propsFile = sub.file('gradle.properties')
    if (!propsFile.exists()) return

    // 手动读取属性文件，判断是否包含 PUBLISH_ARTIFACT_ID
    def subProps = new Properties()
    propsFile.withInputStream { subProps.load(it) }
    if (!subProps.containsKey('PUBLISH_ARTIFACT_ID')) return

    // 支持通过 publishEnabled=false 跳过发布
    def enabled = subProps.getProperty('publishEnabled', 'true')
    if (enabled.equalsIgnoreCase('false')) return

    // 提前 apply 插件（evaluate 之前 apply 是安全的）
    sub.apply plugin: 'maven-publish'
    sub.apply plugin: 'signing'

    // 延迟到子项目 evaluate 完成后再配置发布内容，
    // 因为此处需要检测子项目实际 apply 了哪个插件（android / java / groovy 等）
    sub.afterEvaluate {
        def isAndroidLib = sub.plugins.hasPlugin('com.android.library')
        def isJavaLib = sub.plugins.hasPlugin('java-library')
        def isGroovy = sub.plugins.hasPlugin('groovy')
        def isKotlinJvm = sub.plugins.hasPlugin('org.jetbrains.kotlin.jvm')
        def isKotlinAndroid = sub.plugins.hasPlugin('org.jetbrains.kotlin.android')
        def hasCustomArtifact = sub.ext.has('publishArtifact')

        sub.publishing {
            publications {
                maven(MavenPublication) {
                    groupId = sub.hasProperty('PUBLISH_GROUP_ID')
                            ? sub.property('PUBLISH_GROUP_ID')
                            : rootProject.property('PUBLISH_GROUP_ID')
                    artifactId = sub.property('PUBLISH_ARTIFACT_ID')
                    version = sub.hasProperty('PUBLISH_VERSION')
                            ? sub.property('PUBLISH_VERSION')
                            : rootProject.property('PUBLISH_VERSION')

                    if (hasCustomArtifact) {
                        // 自定义产物模式：直接发布指定文件
                        def art = sub.ext.publishArtifact
                        if (art instanceof File) {
                            artifact(art)
                        } else {
                            artifact(art.toString())
                        }
                    } else if (isAndroidLib || isKotlinAndroid) {
                        // Android Library：发布 release 变体
                        from sub.components.findByName('release')
                                ?: sub.components.findByName('android')
                    } else if (isJavaLib || isKotlinJvm || isGroovy) {
                        // Java / Kotlin JVM / Groovy：发布 java 组件
                        from sub.components.findByName('java')
                    } else {
                        throw new GradleException(
                            "项目 '${sub.name}'：无法识别产物类型。" +
                            "请 apply 已知插件（java-library / com.android.library 等）" +
                            "或在 build.gradle 中设置 ext.publishArtifact。")
                    }

                    // POM 元数据配置
                    pom {
                        name = sub.hasProperty('PUBLISH_POM_NAME')
                                ? sub.property('PUBLISH_POM_NAME')
                                : artifactId
                        description = sub.hasProperty('PUBLISH_POM_DESCRIPTION')
                                ? sub.property('PUBLISH_POM_DESCRIPTION')
                                : rootProject.hasProperty('PUBLISH_POM_DESCRIPTION')
                                ? rootProject.property('PUBLISH_POM_DESCRIPTION')
                                : ''
                        url = sub.hasProperty('PUBLISH_POM_URL')
                                ? sub.property('PUBLISH_POM_URL')
                                : rootProject.hasProperty('PUBLISH_POM_URL')
                                ? rootProject.property('PUBLISH_POM_URL')
                                : ''
                        licenses {
                            license {
                                name = sub.hasProperty('PUBLISH_LICENSE_NAME')
                                        ? sub.property('PUBLISH_LICENSE_NAME')
                                        : 'The MIT License'
                                url = sub.hasProperty('PUBLISH_LICENSE_URL')
                                        ? sub.property('PUBLISH_LICENSE_URL')
                                        : 'https://opensource.org/licenses/MIT'
                            }
                        }
                        developers {
                            developer {
                                id = sub.hasProperty('PUBLISH_DEVELOPER_ID')
                                        ? sub.property('PUBLISH_DEVELOPER_ID')
                                        : rootProject.hasProperty('PUBLISH_DEVELOPER_ID')
                                        ? rootProject.property('PUBLISH_DEVELOPER_ID') : ''
                                name = sub.hasProperty('PUBLISH_DEVELOPER_NAME')
                                        ? sub.property('PUBLISH_DEVELOPER_NAME')
                                        : rootProject.hasProperty('PUBLISH_DEVELOPER_NAME')
                                        ? rootProject.property('PUBLISH_DEVELOPER_NAME') : ''
                                email = sub.hasProperty('PUBLISH_DEVELOPER_EMAIL')
                                        ? sub.property('PUBLISH_DEVELOPER_EMAIL')
                                        : rootProject.hasProperty('PUBLISH_DEVELOPER_EMAIL')
                                        ? rootProject.property('PUBLISH_DEVELOPER_EMAIL') : ''
                            }
                        }
                        scm {
                            connection = sub.hasProperty('PUBLISH_SCM_CONNECTION')
                                    ? sub.property('PUBLISH_SCM_CONNECTION')
                                    : rootProject.hasProperty('PUBLISH_SCM_CONNECTION')
                                    ? rootProject.property('PUBLISH_SCM_CONNECTION') : ''
                            developerConnection = sub.hasProperty('PUBLISH_SCM_DEV_CONNECTION')
                                    ? sub.property('PUBLISH_SCM_DEV_CONNECTION')
                                    : rootProject.hasProperty('PUBLISH_SCM_DEV_CONNECTION')
                                    ? rootProject.property('PUBLISH_SCM_DEV_CONNECTION') : ''
                            url = sub.hasProperty('PUBLISH_SCM_URL')
                                    ? sub.property('PUBLISH_SCM_URL')
                                    : rootProject.hasProperty('PUBLISH_SCM_URL')
                                    ? rootProject.property('PUBLISH_SCM_URL') : ''
                        }
                    }
                }
            }
        }

        // GPG 签名 — Maven Central 强制要求
        sub.signing {
            def signingKey = getSecret("signing.privateKey", "SIGNING_KEY")
            def signingPassword = getSecret("signing.password", "SIGNING_PASSWORD")

            if (signingKey != null && signingPassword != null) {
                // CI 环境：使用 ASCII-armored 内存密钥签名（仅支持 RSA 密钥）
                useInMemoryPgpKeys(signingKey, signingPassword)
            } else {
                // 本地环境：通过 gpg 命令行工具签名（兼容 Ed25519/ECDSA/RSA 所有密钥类型）
                useGpgCmd()
            }

            required { true } // Maven Central 必须签名
            sign sub.publishing.publications.maven
        }

        // ====================================================================
        // Central Portal Publisher API 上传任务
        // ====================================================================
        // 依赖 publishToMavenLocal 生成已签名产物（aar/aar.asc/pom/pom.asc/
        // .module/.module.asc 等），随��将这些文件按 Maven 仓库布局打包成
        // ZIP bundle，POST 到 Portal 的 upload 端点。
        // 发布后产物进入 Portal 的 "Publishing" 队列，需在 Portal 网站或通过
        // status API 触发 release（见任务说明）。
        // ====================================================================

        // 为产物生成 checksum 文件（.md5 / .sha1），Portal 强制要求
        def checksumTask = sub.tasks.register("generatePortalChecksums", {
            group = 'publishing'
            description = "为 ${sub.name} 已签名产物生成 .md5 / .sha1 checksum 文件"
            dependsOn sub.tasks.named('publishMavenPublicationToMavenLocal')
            doLast {
                def pub = sub.publishing.publications.maven
                def m2Repo = new File(System.getProperty("user.home"), ".m2/repository")
                def gavDir = new File(m2Repo,
                        "${pub.groupId.replace('.', '/')}/${pub.artifactId}/${pub.version}")
                if (!gavDir.exists()) {
                    throw new GradleException("m2 GAV 目录不存在: ${gavDir.absolutePath}，请先执行 publishMavenPublicationToMavenLocal")
                }
                gavDir.eachFile { f ->
                    if (f.isFile() && !f.name.endsWith('.md5') && !f.name.endsWith('.sha1')) {
                        def md5File = new File(f.parentFile, "${f.name}.md5")
                        def sha1File = new File(f.parentFile, "${f.name}.sha1")
                        def md5Hex = java.security.MessageDigest.getInstance('MD5').digest(f.bytes).encodeHex().toString()
                        def sha1Hex = java.security.MessageDigest.getInstance('SHA-1').digest(f.bytes).encodeHex().toString()
                        md5File.text = md5Hex
                        sha1File.text = sha1Hex
                    }
                }
            }
        })

        def bundleTask = sub.tasks.register("bundleMavenPublicationToPortal", Zip) {
            group = 'publishing'
            description = "将 ${sub.name} 已签名产物打包为 Portal bundle ZIP"

            // 产物通过 publishMavenPublicationToMavenLocal 输出到 ~/.m2/repository，
            // 这里按 GAV 路径从 m2 读取已签名产物来打包。
            // Portal API 要求 ZIP 内遵循 Maven Repository Layout。
            dependsOn checksumTask
            def pub = sub.publishing.publications.maven
            def m2Repo = new File(System.getProperty("user.home"), ".m2/repository")
            def gavPath = "${pub.groupId.replace('.', '/')}/${pub.artifactId}/${pub.version}"
            def gavDir = new File(m2Repo, gavPath)

            inputs.dir(gavDir).optional()

            from(gavDir) {
                into gavPath
            }
            archiveFileName = "${sub.name}-portal-bundle.zip"
            destinationDirectory = sub.layout.buildDirectory.dir("portal-bundles")
        }

        sub.tasks.register("publishMavenPublicationToMavenCentralPortal", {
            group = 'publishing'
            description = "将 ${sub.name} 发布到 Maven Central Portal（Publisher API）"

            dependsOn bundleTask

            doLast {
                def portalUser = getSecret("portalUsername", "PORTAL_USERNAME")
                def portalPass = getSecret("portalPassword", "PORTAL_PASSWORD")
                if (!portalUser || !portalPass) {
                    throw new GradleException(
                        "缺少 Central Portal 凭证：请在 local.properties 配置 " +
                        "portalUsername / portalPassword（Portal User Token），" +
                        "或设置环境变量 PORTAL_USERNAME / PORTAL_PASSWORD。" +
                        "当前 portalUser=${portalUser ?: '<空>'}")
                }

                def zipFile = bundleTask.get().archiveFile.get().asFile
                if (!zipFile.exists()) {
                    throw new GradleException("Portal bundle 不存在: ${zipFile.absolutePath}")
                }

                // 部署名称在 Portal 内唯一即可。
                // 只使用字母、数字、连字符、点号、下划线，避免冒号等
                // 特殊字符导致 Portal 服务端解析异常（返回 500）。
                def pub = sub.publishing.publications.maven
                def deploymentName = "${pub.groupId}.${pub.artifactId}.${pub.version}".replace(':', '-')

                logger.lifecycle("[Portal] 上传 bundle: ${zipFile.name} " +
                        "(${(zipFile.length() / 1024).round(1)} KB) " +
                        "deployment=${deploymentName}")

                // 构建 multipart body — 只包含 bundle 文件单个 part
                // name / publishingType 通过 URL query parameter 传递（Portal API 规范要求）
                def boundary = "----PortalBoundary${System.nanoTime()}"
                def lineEnd = "\r\n"
                def bodyFile = new File(zipFile.parentFile, "${zipFile.name}.multipart-body")

                bodyFile.withOutputStream { bodyOut ->
                    // 文件: bundle（唯一 multipart part）
                    bodyOut.write("--${boundary}${lineEnd}".getBytes("UTF-8"))
                    bodyOut.write("Content-Disposition: form-data; name=\"bundle\"; filename=\"${zipFile.name}\"${lineEnd}".getBytes("UTF-8"))
                    bodyOut.write("Content-Type: application/octet-stream${lineEnd}".getBytes("UTF-8"))
                    bodyOut.write(lineEnd.getBytes("UTF-8"))
                    zipFile.withInputStream { stream ->
                        bodyOut << stream
                    }
                    bodyOut.write(lineEnd.getBytes("UTF-8"))

                    // 结束边界
                    bodyOut.write("--${boundary}--${lineEnd}".getBytes("UTF-8"))
                }

                def bodyBytes = bodyFile.bytes
                logger.lifecycle("[Portal] multipart body 已写入: ${bodyFile.absolutePath} (${bodyBytes.length} bytes)")

                // name / publishingType 作为 URL query parameter
                def uploadUrl = "https://central.sonatype.com/api/v1/publisher/upload" +
                        "?name=${URLEncoder.encode(deploymentName, "UTF-8")}" +
                        "&publishingType=USER_MANAGED"

                def connection = (javax.net.ssl.HttpsURLConnection) new URL(uploadUrl)
                        .openConnection()
                connection.setRequestMethod("POST")
                connection.setDoOutput(true)
                connection.setFixedLengthStreamingMode(bodyBytes.length)
                connection.setConnectTimeout(120000)
                connection.setReadTimeout(120000)
                connection.setRequestProperty("Authorization",
                        "Bearer " + "${portalUser}:${portalPass}".bytes.encodeBase64().toString())
                connection.setRequestProperty("Content-Type",
                        "multipart/form-data; boundary=${boundary}")

                connection.outputStream.withStream { out ->
                    out.write(bodyBytes)
                }

                def code = connection.responseCode
                def body = (code in 200..299)
                        ? connection.inputStream.text
                        : connection.errorStream?.text
                if (!(code in 200..299)) {
                    throw new GradleException(
                        "Portal 上传失败 (HTTP ${code}): ${body}\n" +
                        "multipart body 文件: ${bodyFile.absolutePath}\n" +
                        "可用 curl 测试: curl -X POST -H \"Authorization: Bearer <base64(user:pass)>\" -H \"Content-Type: multipart/form-data; boundary=${boundary}\" --data-binary @\"${bodyFile.absolutePath}\" \"${uploadUrl}\"")
                }
                logger.lifecycle("[Portal] 上传成功 (HTTP ${code})，部署已进入自动发布队列。")
                logger.lifecycle("[Portal] 响应: ${body}")
                logger.lifecycle("[Portal] 可在 https://central.sonatype.com/publishing 查看 " +
                        "部署状态（检查/校验/发布）。")
            }
        })
    }
}
